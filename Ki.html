<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS-9 Escape Game</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

html, body {
  margin: 0; padding: 0; height: 100%;
  background: black;
  color: #a0f0e0;
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  user-select: none;
}

#matrixCanvas {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 1;
}

#content {
  position: relative;
  z-index: 20;
  text-align: center;
  padding-top: 50px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 { margin-bottom: 20px; letter-spacing: 2px; }

input[type=password] {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px;
  padding: 10px;
  width: 300px;
  border-radius: 4px;
  border: 1px solid #33ffcc;
  background: black;
  color: #33ffcc;
}

button {
  font-size: 18px;
  padding: 10px 20px;
  margin-left: 10px;
  border-radius: 4px;
  border: 1px solid #33ffcc;
  background: black;
  color: #33ffcc;
  cursor: pointer;
}

#message { margin-top: 12px; min-height: 28px; font-weight: bold; }

#wifi-container { width: 220px; height: 220px; margin-top: 50px; }

.hidden { opacity: 0.1; }

#timer { position: fixed; bottom: 12px; right: 12px; font-size: 18px; font-weight: bold; }

</style>
</head>

<body>

<canvas id="matrixCanvas"></canvas>

<div id="content">
  <h1>NEXUS-9 // SICHERHEITSSYSTEM</h1>

  <input type="password" id="passwordInput"/>
  <button id="submitBtn">ENTER</button>

  <div id="message"></div>
</div>

<div id="timer">ZEIT: 10:00</div>

<script>
"use strict";

// einfache Version (gekürzt)

async function sha256(msg){
  const buf = new TextEncoder().encode(msg);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

const passwords = ["Obs1d1an","Cryptex-Alpha","OmegaShutdown"];
let level = 0;

async function checkPassword(){
  const input = document.getElementById("passwordInput").value;
  if(input === passwords[level]){
    level++;
    document.getElementById("message").textContent = "RICHTIG!";
  } else {
    document.getElementById("message").textContent = "FALSCH!";
  }
}

document.getElementById("submitBtn").onclick = checkPassword;
</script>

</body>
</html>
